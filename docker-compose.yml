# Full local stack: TimescaleDB + Redis + FastAPI web + worker.
# (A production Next.js frontend image is built via frontend/Dockerfile.)
#
# Usage:
#   docker compose up --build          # build & start everything
#   docker compose run --rm web alembic upgrade head     # create schema once
#   docker compose down -v             # stop & wipe volumes

services:
  timescaledb:
    image: timescale/timescaledb:2.15.0-pg16
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant_password_2024
      POSTGRES_DB: forex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d forex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web process: serves HTTP + WS. Background ingest/learning is OFF here
  # (RUN_BACKGROUND_TASKS=false) and handled by the `worker` service (P2 #10).
  web:
    build: .
    environment:
      TIMESCALEDB_URL: postgresql+asyncpg://quant:quant_password_2024@timescaledb:5432/forex
      REDIS_URL: redis://redis:6379/0
      RUN_BACKGROUND_TASKS: "false"
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: INFO
      MODEL_DIR: /app/models
      TFT_MODEL_PATH: /app/models/tft_v3.pt
      LGBM_MODEL_PATH: /app/models/lgbm_features.pkl
      SCALER_PATH: /app/models/scalers.pkl
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Worker process: runs the Binance ingest stream + learning loop.
  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    environment:
      TIMESCALEDB_URL: postgresql+asyncpg://quant:quant_password_2024@timescaledb:5432/forex
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: INFO
      MODEL_DIR: /app/models
      TFT_MODEL_PATH: /app/models/tft_v3.pt
      LGBM_MODEL_PATH: /app/models/lgbm_features.pkl
      SCALER_PATH: /app/models/scalers.pkl
    volumes:
      - ./models:/app/models:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Production frontend (multi-stage Next.js build, see frontend/Dockerfile).
  # NEXT_PUBLIC_* are inlined at build time, so they're passed as build args.
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
